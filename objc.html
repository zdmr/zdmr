<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tugrulozdemir.com @ Obj-C</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0d1117;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
        }
        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            width: fit-content;
            max-width: 90vw;
            padding: 20px;
        }
        .comment {
            font-size: 0.9rem;
            color: #7F8C98;
            opacity: 0.8;
            margin-bottom: -4px;
        }
        .objc-code {
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            color: #ffffff;
            white-space: nowrap;
        }
        .keyword { color: #D3429E; }
        .vim-command {
            font-size: 1.2rem;
            color: #7d8590;
            padding-left: 25px;
            opacity: 0.8;
            position: relative;
        }
        .vim-command::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #007aff;
            margin-left: 6px;
            vertical-align: middle;
            animation: blink 1.2s step-end infinite;
        }
        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #007aff; }
        }
        @media (max-width: 600px) {
            .objc-code { 
                font-size: 5.2vw; 
                letter-spacing: -0.3px;
            }
            .vim-command { font-size: 4vw; }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="comment">// since 2010</div>
        <div class="objc-code">
            <span class="keyword">int</span> main(<span class="keyword">int</span> argc, <span class="keyword">char</span> *argv[])
        </div>
        <div class="vim-command">
            :wq
        </div>
    </div>
</body>
</html>
