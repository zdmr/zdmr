<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugrulozdemir.com</title>
    <style>
        html { 
            height: -webkit-fill-available; 
            overflow-x: hidden; 
        }
        body {
            background-color: #0d1117;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            -webkit-font-smoothing: antialiased;
            color: #e6edf3;
            overflow-x: hidden;
        }
        .content-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            height: -webkit-fill-available;
            padding: 40px 30px;
            box-sizing: border-box;
            justify-content: space-between;
        }
        .code-section {
            margin-top: auto;
            margin-bottom: auto;
            width: 100%;
        }
        .swift-code-block {
            margin: 0;
            padding: 0;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            color: #e6edf3;
            line-height: 1.4;
            background: transparent;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        code { font-family: inherit; }
        .keyword { color: #ff7b72; }
        .dot-case {
            color: #d2a8ff;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(210, 168, 255, 0.4);
        }
        .vim-container {
            margin-top: 50px;
            width: 100%;
        }
        .status-line {
            background-color: #313131;
            color: #d0d0d0;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            padding: 2px 10px;
            margin-bottom: 6px;
            user-select: none;
            border-bottom: 1px solid #1f1f1f;
        }
        .status-left { font-weight: normal; }
        .status-right { opacity: 0.8; }
        .vim-command {
            display: block;
            font-size: 1.1rem;
            color: #e6edf3;
            padding-left: 2px;
            position: relative;
        }
        .vim-command::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #347CFE;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1.2s step-end infinite;
        }
        .footer-nav {
            text-align: center;
            padding-top: 20px;
        }
        .contact-link {
            font-size: 0.7rem;
            color: #30363d;
            text-decoration: none;
            border-bottom: 1px dashed #30363d;
            transition: all 0.3s;
            display: inline-block;
            letter-spacing: 0.5px;
        }
        .contact-link:hover {
            color: #7d8590;
            border-bottom-color: #7d8590;
        }
        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #347CFE; }
        }
        @media (max-width: 600px) {
            .swift-code-block { font-size: 1.2rem; }
            .vim-command { font-size: 1rem; }
            .status-line { font-size: 0.7rem; }
            .content-wrapper { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <main class="content-wrapper">
        <div class="code-section">
            <pre class="swift-code-block"><code><span class="keyword">if let</span> dot <span class="keyword">=</span> <span class="dot-case">.</span> {

}</code></pre>
            <div class="vim-container">
                <div class="status-line" role="status">
                    <span class="status-left">main.swift [+]</span>
                    <span class="status-right">utf-8 | swift | 1,1</span>
                </div>
                <samp class="vim-command">:wq</samp>
            </div>
        </div>
        <nav class="footer-nav">
            <a href="https://t.me/kullanici_adin" class="contact-link">CONNECT: telegram_gateway.log</a>
        </nav>
    </main>
</body>
</html>
