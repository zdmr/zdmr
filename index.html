<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugrulozdemir.com</title>
    <style>
        html { height: -webkit-fill-available; }
        body {
            background-color: #0d1117;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: 100dvh;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            -webkit-font-smoothing: antialiased;
            color: #e6edf3;
            position: relative;
        }
        .content-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 450px;
            padding: 0 30px;
            box-sizing: border-box;
        }
        
        .swift-code-block {
            margin: 0;
            padding: 0;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            color: #e6edf3;
            line-height: 1.4;
            background: transparent;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        
        code {
            font-family: inherit;
        }

        .keyword { color: #ff7b72; }
        .dot-case {
            color: #d2a8ff;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(210, 168, 255, 0.4);
        }
        
        .vim-container {
            margin-top: 50px;
            width: 100%;
        }
        
        .status-line {
            background-color: #30363d;
            color: #e6edf3;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            padding: 4px 10px;
            margin-bottom: 8px;
            user-select: none; 
        }
        
        .status-left { font-weight: bold; color: #f0883e; }
        .status-right { opacity: 0.7; }

        .vim-command {
            display: block; 
            font-size: 1.2rem;
            color: #7d8590;
            padding-left: 2px;
            opacity: 0.9;
            position: relative;
        }
        
        .vim-command::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: #347CFE;
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1.2s step-end infinite;
        }

        .archive-link {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            color: #30363d;
            text-decoration: none;
            border-bottom: 1px dashed #30363d;
            transition: color 0.3s;
        }
        
        .archive-link:hover {
            color: #7d8590;
            border-bottom-color: #7d8590;
        }

        @keyframes blink {
            from, to { background-color: transparent; }
            50% { background-color: #347CFE; }
        }

        @media (max-width: 600px) {
            .swift-code-block { font-size: 1.2rem; }
            .vim-command { font-size: 1rem; }
            .status-line { font-size: 0.7rem; }
            .content-wrapper { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <main class="content-wrapper">
        <pre class="swift-code-block"><code><span class="keyword">if let</span> dot <span class="keyword">=</span> <span class="dot-case">.</span> {

}</code></pre>

        <div class="vim-container">
            <div class="status-line" role="status">
                <span class="status-left">main.swift [+]</span>
                <span class="status-right">utf-8 | swift | 1:1</span>
            </div>
            <samp class="vim-command">:wq</samp>
        </div>
    </main>

    <nav>
        <a href="objc.html" class="archive-link">ARCHIVE: legacy_v1.0.objc</a>
    </nav>

</body>
</html>
