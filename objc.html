<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tugrulozdemir.com @ Obj-C</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #0d1117;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
        }
        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px;
            text-align: left;
            width: fit-content;
            max-width: 90vw;
            padding: 20px;
        }
        .since-tag { 
            color: #7F8C98; 
            font-size: 0.85rem; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .header-comment {
            font-size: 0.9rem;
            color: #6A737D;
            line-height: 1.6;
            border-left: 2px solid #30363d;
            padding-left: 15px;
        }
        .objc-code {
            font-size: 1.2rem;
            color: #ffffff;
            line-height: 1.5;
            /* Mobilde taşmayı yöneten kural */
            white-space: pre-wrap;
            word-break: break-all;
        }
        .keyword { color: #D3429E; }
        .method { color: #3ad900; }

        @media (max-width: 600px) {
            .objc-code { font-size: 4vw; }
            .header-comment { font-size: 3.5vw; }
            .since-tag { font-size: 3vw; }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <div class="since-tag">
            Since Manual Reference Counting
        </div>

        <div class="header-comment">
            // Türk Telekom, THY, TTNET, Muud, Avea<br>
            // Developed by Tugrul Ozdemir
        </div>
        
        <div class="objc-code">
<span class="keyword">int</span> main(<span class="keyword">int</span> argc, 
         <span class="keyword">const char</span> * argv[]) {
    
    [foundation <span class="method">retain</span>];

}</div>
    </div>
</body>
</html>
